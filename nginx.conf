# ─────────────────────────────────────────────────────────────────────────
# Cailorie bot — nginx server block for cailorie.mycaregiver.xyz.
#
# This is NOT a standalone nginx config. It is a server block that the SHARED
# fyp nginx container serves. fyp's nginx already owns ports 80/443 for
# api.mycaregiver.xyz; this block adds cailorie.mycaregiver.xyz on the same
# nginx, routing /tg/ → http://cailorie-bot:8080.
#
# ── ONE-TIME SETUP (do this on the VM, only once) ──
# fyp's docker-compose mounts nginx.conf as a single file. Switch it to a
# directory so this block can be dropped in alongside fyp's:
#
#   cd ~/fyp/backend
#   mkdir -p nginx && mv nginx.conf nginx/default.conf
#   # edit docker-compose.prod.yml: change the nginx volume mount from
#   #   ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
#   # to
#   #   ./nginx:/etc/nginx/conf.d:ro
#   docker network create shared || true
#   docker network connect shared caregiver-nginx || true
#   docker compose -f docker-compose.prod.yml up -d --force-recreate nginx
#
# After that, each `cailorie` deploy just copies this file to
# ~/fyp/backend/nginx/cailorie.conf and reloads fyp's nginx (handled by
# .github/workflows/deploy.yml automatically).
#
# The cailorie-bot container is reachable from fyp's nginx because both
# composes attach the bot to a shared external Docker network (`shared`).
# See docker-compose.prod.yml.
# ─────────────────────────────────────────────────────────────────────────

# HTTP: ACME challenge + redirect to HTTPS
server {
    listen 80;
    server_name cailorie.mycaregiver.xyz;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS: reverse proxy to the cailorie bot webhook listener (plain HTTP
# inside the Docker network).
server {
    listen 443 ssl;
    server_name cailorie.mycaregiver.xyz;

    ssl_certificate /etc/letsencrypt/live/cailorie.mycaregiver.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cailorie.mycaregiver.xyz/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Telegram sends JSON updates; 10m is generous but harmless.
    client_max_body_size 10m;

    # Health endpoint (for external monitoring / uptime checks)
    location = /health {
        proxy_pass http://cailorie-bot:8081/health;
        proxy_set_header Host $host;
    }

    # Telegram webhook endpoint — proxy to the bot's webhook listener.
    # The path (e.g. /tg/<secret>/) matches WEBHOOK_PUBLIC_URL. Telegram
    # POSTs updates here; nginx forwards them unchanged.
    location /tg/ {
        proxy_pass http://cailorie-bot:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    gzip on;
    gzip_types text/plain application/json;
    gzip_min_length 256;
}