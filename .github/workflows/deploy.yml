name: Deploy to Oracle VM

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.OCI_VM_IP }}
          username: ${{ secrets.OCI_VM_USER || 'ubuntu' }}
          key: ${{ secrets.OCI_SSH_PRIVATE_KEY }}
          script_stop: true
          command_timeout: 30m
          script: |
            set -euo pipefail
            export PATH="/usr/local/bin:/usr/bin:/bin:/usr/local/sbin:/usr/sbin:/sbin"

            echo "=== Environment ==="
            docker --version || { echo "ERROR: docker not found"; exit 1; }
            git --version || { echo "ERROR: git not found"; exit 1; }

            # ── Clone or pull latest code ──
            if [ -d "$HOME/cailorie/.git" ]; then
              cd "$HOME/cailorie"
              git fetch origin
              git reset --hard origin/main
              echo "Pulled latest: $(git log -oneline -1)"
            else
              git clone https://github.com/${{ github.repository }}.git "$HOME/cailorie"
              cd "$HOME/cailorie"
              echo "Cloned repository"
            fi

            # ── Shared Docker network (so fyp's nginx can reach cailorie-bot) ──
            docker network inspect shared >/dev/null 2>&1 || docker network create shared

            # ── .env (create if missing, never overwrite secrets) ──
            if [ ! -f .env ]; then
              echo "Creating .env from .env.example..."
              cp .env.example .env
              echo "EDIT .env on the VM to fill in TELEGRAM_TOKEN, GEMINI_API_KEY, GROUP_CHAT_ID, WEBHOOK_*"
            fi

            # ── Build and start the bot ──
            echo "Building and starting the cailorie bot..."
            docker compose -f docker-compose.prod.yml down || true
            docker compose -f docker-compose.prod.yml up -d --build

            # ── Wire the nginx server block into the sibling fyp nginx ──
            # fyp's nginx must mount a conf.d DIRECTORY (not a single file) so
            # this block can be dropped in. Do the one-time switch if needed.
            if [ -d "$HOME/fyp/backend" ]; then
              cd "$HOME/fyp/backend"
              if [ ! -d nginx ]; then
                echo "One-time fyp nginx mount switch..."
                mkdir -p nginx
                [ -f nginx.conf ] && mv nginx.conf nginx/default.conf
                # Patch docker-compose.prod.yml: file mount → directory mount
                sed -i 's#./nginx.conf:/etc/nginx/conf.d/default.conf:ro#./nginx:/etc/nginx/conf.d:ro#' docker-compose.prod.yml
              fi
              # Drop the cailorie server block into fyp's nginx conf.d.
              cp "$HOME/cailorie/nginx.conf" nginx/cailorie.conf
              # Ensure the shared network exists and fyp's nginx is on it.
              docker network inspect shared >/dev/null 2>&1 || docker network create shared
              docker network connect shared caregiver-nginx 2>/dev/null || true
              docker compose -f docker-compose.prod.yml up -d --force-recreate nginx
              docker compose -f docker-compose.prod.yml exec -T nginx nginx -s reload \
                && echo "fyp nginx reloaded with cailorie server block" \
                || echo "WARN: could not reload fyp nginx"
              cd "$HOME/cailorie"
            else
              echo "WARN: ~/fyp/backend not found — skip nginx wiring. Deploy fyp first, then re-run."
            fi

            # ── Wait for bot health ──
            echo "Waiting for bot to become healthy..."
            for i in $(seq 1 30); do
              if docker compose -f docker-compose.prod.yml ps bot | grep -q healthy; then
                echo "Bot is healthy!"
                break
              fi
              echo "Waiting... ($i/30)"
              sleep 2
            done

            # ── Cleanup ──
            docker image prune -f

            # ── Summary ──
            echo ""
            echo "=== Deployment Complete ==="
            docker compose -f docker-compose.prod.yml ps
            echo ""
            free -h