name: Deploy to Oracle VM

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.OCI_VM_IP }}
          username: ubuntu
          key: ${{ secrets.OCI_SSH_PRIVATE_KEY }}
          script_stop: true
          command_timeout: 30m
          script: |
            set -euo pipefail
            export PATH="/usr/local/bin:/usr/local/sbin:/usr/bin:/usr/sbin:/bin:/sbin"

            echo "=== Environment ==="
            docker --version
            git --version

            # ── Clone or pull latest code ──
            # appleboy/ssh-action with script_stop:true exits on ANY command
            # returning non-zero, including `[ -d dir ]` when dir is absent.
            # Workaround: assign the test result to a var inside a compound
            # command whose overall exit code is always 0, then branch on the
            # var (string comparison exits 0 either way).
            REPO_EXISTS=no
            { [ -d "$HOME/cailorie/.git" ] && REPO_EXISTS=yes; } || true
            if [ "$REPO_EXISTS" = "yes" ]; then
              echo "Existing repo found, pulling latest..."
              cd "$HOME/cailorie"
              git fetch origin main
              git reset --hard origin/main
              echo "Pulled latest: $(git log --oneline -1)"
            else
              echo "Cloning repository..."
              rm -rf "$HOME/cailorie"
              git clone https://github.com/${{ github.repository }}.git "$HOME/cailorie"
              cd "$HOME/cailorie"
              echo "Cloned repository: $(git log --oneline -1)"
            fi

            # ── Shared Docker network (so fyp's nginx can reach cailorie-bot) ──
            docker network inspect shared >/dev/null 2>&1 || docker network create shared

            # ── .env (create if missing, never overwrite secrets) ──
            ENV_EXISTS=no
            { [ -f .env ] && ENV_EXISTS=yes; } || true
            if [ "$ENV_EXISTS" = "no" ]; then
              echo "Creating .env from .env.example..."
              cp .env.example .env
              echo "EDIT .env on the VM to fill in TELEGRAM_TOKEN, GEMINI_API_KEY, GROUP_CHAT_ID, WEBHOOK_*"
            fi

            # ── Build and start the bot ──
            echo "Building and starting the cailorie bot..."
            docker compose -f docker-compose.prod.yml down || true
            docker compose -f docker-compose.prod.yml up -d --build

            # ── Reload fyp's nginx so it picks up the cailorie server block ──
            HAS_FYP=0
            [ -d "$HOME/fyp/backend" ] && HAS_FYP=1 || true
            if [ "$HAS_FYP" = "1" ]; then
              docker compose -f "$HOME/fyp/backend/docker-compose.prod.yml" exec -T nginx nginx -s reload \
                && echo "fyp nginx reloaded (cailorie server block active)" \
                || echo "WARN: could not reload fyp nginx"
            else
              echo "WARN: ~/fyp/backend not found — deploy fyp first, then re-run."
            fi

            # ── Wait for bot health ──
            echo "Waiting for bot to become healthy..."
            i=0
            while [ "$i" -lt 30 ]; do
              i=$((i + 1))
              HEALTHY=0
              docker compose -f docker-compose.prod.yml ps bot | grep -q healthy && HEALTHY=1 || true
              if [ "$HEALTHY" = "1" ]; then
                echo "Bot is healthy!"
                break
              fi
              echo "Waiting... ($i/30)"
              sleep 2
            done

            # ── Cleanup ──
            docker image prune -f

            # ── Summary ──
            echo ""
            echo "=== Deployment Complete ==="
            docker compose -f docker-compose.prod.yml ps
            echo ""
            free -h