name: cailorie

services:
  bot:
    build: .
    container_name: cailorie-bot
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8081/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    volumes:
      - botdata:/var/lib/cailorie
    networks:
      - shared
    # Oracle Free Tier A1.Flex memory limits
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

# This network is shared with the fyp nginx container so that fyp's nginx can
# resolve `cailorie-bot` and proxy /tg/ → http://cailorie-bot:8080.
# Create it once on the VM:  docker network create shared
networks:
  shared:
    external: true

volumes:
  botdata: